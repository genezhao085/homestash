name: homestash
description: 家庭储物管理 - 拍照记录物品，快速查找
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # 相机拍照
  image_picker: ^1.1.2
  # 本地数据库
  sqflite: ^2.3.3
  path: ^1.9.0
  # 路径处理
  path_provider: ^2.1.3
  # 日期格式化
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
